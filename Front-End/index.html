<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/FavIco.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEB-LIS PathSys - Nuevo Frontend</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function() {
        var PROD_HOST = 'https://pathsys-backend.onrender.com'
        var origFetch = window.fetch
        // Reemplazar cualquier intento de llamar a localhost o 127.0.0.1 en cualquier puerto
        if (typeof origFetch === 'function') {
          var localhostRegex = /^https?:\/\/(localhost|127\.0\.0\.1)(:\\d+)?/i
          window.fetch = function(input, init) {
            try {
              if (typeof input === 'string' && localhostRegex.test(input)) {
                input = input.replace(localhostRegex, PROD_HOST)
              }
            } catch (_) { /* no-op */ }
            return origFetch.apply(this, [input, init])
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
